; PlatformIO Project Configuration File
;
; Build one of the two environments below to select the magnetic encoder.
;
;   pio run -e esp32-s3-as5048a
;   pio run -e esp32-s3-as5600

[platformio]
default_envs = esp32-s3-as5048a

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
framework = arduino
board = esp32-s3-fh4r2
lib_deps =
    adafruit/Adafruit NeoPixel@^1.15.1
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
monitor_port = /dev/ttyACM0
monitor_speed = 115200
monitor_filters =
    default,
    log2file,
    time

[env:esp32-s3-as5048a]
build_flags =
    ${env.build_flags}
    -DMAGNETIC_ENCODER_TYPE=1

[env:esp32-s3-as5600]
build_flags =
    ${env.build_flags}
    -DMAGNETIC_ENCODER_TYPE=2
